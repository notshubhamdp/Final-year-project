<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Property Details - Landlord - Smart Rent House</title>
    <style>
        :root{--bg:#f6f8fb;--card:#ffffff;--accent:#4f46e5;--muted:#6b7280}
        html,body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(135deg,#eef2ff 0%, #f8fafc 100%);color:#0f172a}
        .container{max-width:1000px;margin:32px auto;padding:0 24px}
        .section{background:var(--card);padding:20px;border-radius:10px;margin-bottom:16px}
        .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
        .gallery-item{width:100%;height:150px;background:#f3f4f6;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:32px;border:2px solid transparent;transition:transform 0.15s,box-shadow 0.15s}
        .gallery-item:hover{transform:scale(1.03);box-shadow:0 6px 18px rgba(79,70,229,0.12);border-color:var(--accent)}
        .document-list{list-style:none;padding:0;margin:0}
        .document-item{padding:8px;background:#f3f4f6;margin-bottom:8px;border-radius:6px}
        .btn{display:inline-block;padding:10px 14px;border-radius:8px;text-decoration:none;color:white;background:var(--accent);font-weight:600}
        .muted{color:var(--muted)}
    </style>
    <link rel='stylesheet' href='/css/landlord-property-detail.css'>
        
    <link rel="stylesheet" href="/css/professional-theme.css">
        <link rel="stylesheet" href="/css/chatbot-widget.css">
<link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
<div class="container">
    <a th:href="@{/landlord/my-properties}" style="display:inline-block;margin-bottom:12px;color:var(--accent)">&#8592; Back to My Properties</a>

    <div class="section">
        <h2 th:text="${property.name}">Property Name</h2>
        <p class="muted" th:text="${property.address}">Address</p>
        <p style="margin-top:8px"><strong>Price:</strong> <span th:text="'&#8377;' + ${property.price}">&#8377;0</span></p>
    </div>

    <div class="section">
        <h3>Images</h3>
        <div class="gallery">
            <div th:if="${#arrays.isEmpty(imagePaths)}" style="grid-column:1/-1;text-align:center;padding:24px;color:var(--muted)">
                <div style="font-size:28px;margin-bottom:6px">&#128248;</div>
                <div>No images uploaded</div>
            </div>
            <a th:each="imagePath : ${imagePaths}"
               th:href="@{/landlord/file/image/{propertyId}/{filename}(propertyId=${property.id}, filename=${imagePath})}"
               target="_blank" class="gallery-item">
                <img th:src="@{/landlord/file/image/{propertyId}/{filename}(propertyId=${property.id}, filename=${imagePath})}"
                     alt="Property image" style="width:100%;height:100%;object-fit:cover;border-radius:6px" onerror="this.src='/images/no-image.png'">
            </a>
        </div>
        <div style="margin-top:12px">
            <a th:href="@{/landlord/upload-images/{propertyId}(propertyId=${property.id})}" class="btn">Upload Images</a>
        </div>
    </div>

    <div class="section">
        <h3>Property Location</h3>
        <p style="margin:8px 0;color:var(--muted)">Set or update your property location on the map</p>
        <div style="margin-top:12px">
            <a th:href="@{/landlord/property-map/{propertyId}(propertyId=${property.id})}" class="btn" style="background:#10b981;color:white;text-decoration:none;display:inline-block;padding:10px 14px;border-radius:8px;font-weight:600">&#128205; View on Map</a>
        </div>
    </div>

    <div class="section">
        <h3>Documents</h3>
        <div th:if="${#arrays.isEmpty(documentPaths)}" style="text-align:center;padding:24px;color:var(--muted)">
            <div style="font-size:28px;margin-bottom:6px">&#128196;</div>
            <div>No documents uploaded</div>
        </div>
        <ul th:if="${!#arrays.isEmpty(documentPaths)}" class="document-list">
            <li th:each="docPath : ${documentPaths}" class="document-item">
                <a th:href="@{/landlord/file/document/{propertyId}/{filename}(propertyId=${property.id}, filename=${docPath})}"
                   target="_blank" style="text-decoration:none;color:var(--accent);font-weight:600">&#128196; <span th:text="${docPath}">document.pdf</span></a>
            </li>
        </ul>
        <div style="margin-top:12px">
            <a th:href="@{/landlord/upload-documents/{propertyId}(propertyId=${property.id})}" class="btn">Upload Documents</a>
        </div>
    </div>

    <div class="section">
        <h3>Quick Edit</h3>
        <form th:action="@{/landlord/property/{id}/update(id=${property.id})}" method="post">
            <div style="margin-bottom:8px">
                <label>Property Name</label>
                <input type="text" name="name" th:value="${property.name}" style="width:100%;padding:8px;border-radius:6px;border:1px solid #e5e7eb">
            </div>
            <div style="margin-bottom:8px">
                <label>Owner Name</label>
                <input type="text" name="ownerName" th:value="${property.ownerName}" style="width:100%;padding:8px;border-radius:6px;border:1px solid #e5e7eb">
            </div>
            <div style="margin-bottom:8px">
                <label>Price (&#8377;)</label>
                <input type="number" name="price" step="0.01" th:value="${property.price}" style="width:100%;padding:8px;border-radius:6px;border:1px solid #e5e7eb">
            </div>
            <div style="margin-bottom:8px">
                <label>Description</label>
                <textarea name="description" style="width:100%;padding:8px;border-radius:6px;border:1px solid #e5e7eb" th:text="${property.description}"></textarea>
            </div>
            <div style="display:flex;gap:8px;margin-top:8px">
                <button type="submit" class="btn">Save Changes</button>
                <a th:href="@{/landlord/my-properties}" style="display:inline-block;padding:10px 14px;border-radius:8px;background:#6b7280;color:white;text-decoration:none">Cancel</a>
            </div>
        </form>
        <form th:action="@{/landlord/property/{id}/delete(id=${property.id})}" method="post" style="margin-top:12px"
              onsubmit="return confirm('Are you sure you want to delete this property This action cannot be undone.')">
            <button type="submit" style="border:none;background:#dc2626;color:white;border-radius:8px;padding:10px 14px;font-weight:600;cursor:pointer">
                Delete Property
            </button>
        </form>
    </div>
</div>
    <script src="/js/chatbot-widget.js"></script>
</body>
</html>
