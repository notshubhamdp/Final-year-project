<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book Property</title>
    <style>
        body{font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f6f8fb;color:#0f172a}
        .container{max-width:700px;margin:32px auto;padding:24px}
        .card{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
        label{display:block;margin-top:12px;font-weight:600}
        input[type=text], input[type=number]{width:100%;padding:8px;border-radius:6px;border:1px solid #e5e7eb}
        .actions{margin-top:12px}
        .button{display:inline-block;padding:10px 14px;border-radius:8px;background:#4f46e5;color:#fff;text-decoration:none;border:none}
    </style>
    <link rel='stylesheet' href='/css/book-property.css'>
        
    <link rel="stylesheet" href="/css/professional-theme.css">
        <link rel="stylesheet" href="/css/chatbot-widget.css">
<link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
<div class="container">
    <a th:href="@{/property/{id}(id=${property.propertyId})}" class="button">&#8592; Back to Property</a>
    <div class="card" style="margin-top:12px">
        <h2>Book Property</h2>
        <p th:text="'Property: ' + ${property.name}"></p>
        <p><strong>Advance to pay:</strong> &#8377;<span th:text="${#numbers.formatDecimal(advanceAmount, 0, 'COMMA', 2, 'POINT')}"></span></p>

        <form method="post" th:action="@{/book-property}">
            <input type="hidden" name="propertyId" th:value="${property.propertyId}" />
            <label for="advance">Advance Amount (&#8377;)</label>
            <input type="number" step="0.01" id="advance" name="advance" th:value="${advanceAmount}" required />
            <div class="actions">
                <button type="submit" class="button">Request Booking</button>
            </div>
        </form>
    </div>
</div>
    <script src="/js/chatbot-widget.js"></script>
</body>
</html>
