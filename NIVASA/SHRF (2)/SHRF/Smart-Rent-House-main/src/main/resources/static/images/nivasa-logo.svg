<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ec9d9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a8d5ba;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f4b69d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="houseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGradient)"/>
  
  <!-- House structure -->
  <g id="house">
    <!-- Roof -->
    <polygon points="100,45 60,85 140,85" fill="url(#houseGradient)"/>
    
    <!-- House body -->
    <rect x="55" y="85" width="90" height="70" fill="#3d5569" stroke="#2c3e50" stroke-width="2"/>
    
    <!-- Door -->
    <rect x="85" y="110" width="30" height="45" fill="#8b7355" stroke="#6b5344" stroke-width="1.5"/>
    <circle cx="113" cy="133" r="2.5" fill="#d4a574"/>
    
    <!-- Window 1 -->
    <rect x="65" y="95" width="20" height="20" fill="#87ceeb" stroke="#2c3e50" stroke-width="1"/>
    <line x1="75" y1="95" x2="75" y2="115" stroke="#2c3e50" stroke-width="0.5"/>
    <line x1="65" y1="105" x2="85" y2="105" stroke="#2c3e50" stroke-width="0.5"/>
    
    <!-- Window 2 -->
    <rect x="115" y="95" width="20" height="20" fill="#87ceeb" stroke="#2c3e50" stroke-width="1"/>
    <line x1="125" y1="95" x2="125" y2="115" stroke="#2c3e50" stroke-width="0.5"/>
    <line x1="115" y1="105" x2="135" y2="105" stroke="#2c3e50" stroke-width="0.5"/>
  </g>
  
  <!-- Leaf accent -->
  <g id="leaf" transform="translate(125, 55)">
    <!-- Leaf shape -->
    <ellipse cx="0" cy="0" rx="8" ry="12" fill="#4CAF50" transform="rotate(-25)"/>
    <!-- Leaf vein -->
    <path d="M 0,-12 Q 2,-6 0,0 Q -2,6 0,12" stroke="#2d7c2d" stroke-width="0.5" fill="none"/>
  </g>
</svg>