<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - NIVASA</title>
    <link rel='stylesheet' href='/css/login.css'>
    <link rel='stylesheet' href='/css/default-ui.css'>
    <link rel="icon" href="/images/nivasa-logo.svg" type="image/svg+xml">
    
    <link rel="stylesheet" href="/css/professional-theme.css">
        <link rel="stylesheet" href="/css/chatbot-widget.css">
<link rel="stylesheet" href="/css/responsive.css">
    <style>
        :root{--bg:#f3f4f6;--card:#fff;--accent:#4f46e5;--muted:#6b7280}
        body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#f8fafc,#eef2ff)}
        .card{width:420px;background:var(--card);border-radius:12px;padding:28px;box-shadow:0 12px 30px rgba(2,6,23,0.08)}
        h2{margin:0 0 8px;color:#0f172a}
        p.lead{margin:0 0 18px;color:var(--muted)}
        .field{display:flex;flex-direction:column;margin-bottom:12px}
        label{font-size:.85rem;margin-bottom:6px;color:var(--muted)}
        input{padding:12px;border-radius:10px;border:1px solid #e6e9ef;background:#fbfdff}
        .btn{display:inline-block;padding:12px 16px;border-radius:10px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-weight:600}
        .links{display:flex;justify-content:space-between;margin-top:12px;font-size:.95rem}
        a.link{color:var(--accent);text-decoration:none}
        .action-btn{display:inline-block;padding:9px 14px;border-radius:10px;text-decoration:none;font-weight:600;font-size:.9rem;transition:all .2s}
        .forgot-btn{background:#eef2ff;color:#4338ca;border:1px solid #c7d2fe}
        .forgot-btn:hover{background:#e0e7ff;transform:translateY(-1px)}
        .register-btn{background:linear-gradient(135deg,#10b981 0%,#059669 100%);color:#fff;border:1px solid #10b981;box-shadow:0 6px 14px rgba(16,185,129,.25)}
        .register-btn:hover{transform:translateY(-1px);box-shadow:0 10px 18px rgba(16,185,129,.3)}
        .alert{padding:10px;border-radius:8px;margin-bottom:12px}
        .alert-success{background:#ecfdf5;color:#065f46}
        .alert-error{background:#fff1f2;color:#9f1239}
        .return-home-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:999px;background:linear-gradient(135deg,#6366f1 0%,#4f46e5 100%);color:#fff;text-decoration:none;font-weight:600;box-shadow:0 8px 20px rgba(79,70,229,0.25);transition:all .25s ease}
        .return-home-btn:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(79,70,229,0.35)}
        .form-actions{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
        @media (max-width: 600px){
            .card{width:100%;max-width:420px;padding:20px}
            .form-actions{flex-direction:column;align-items:stretch;gap:12px}
            .links{display:flex;flex-direction:column;gap:8px}
            .action-btn{margin-left:0 !important;text-align:center}
        }
    </style>
</head>
<body>
    <!-- Loading Animation -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner-container">
            <div class="logo-spinner">
                <img src="/images/nivasa-logo.svg" alt="NIVASA" class="logo-image">
            </div>
            <div class="loading-text">Loading<span class="dot-animation"></span></div>
        </div>
    </div>
    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div style="display:flex;align-items:center;gap:8px;font-weight:700;color:var(--accent)">
                <img src="/images/nivasa-logo.svg" alt="NIVASA" style="width: 32px; height: 32px;">
                <span>NIVASA</span>
            </div>
        </div>
        <h2>Welcome back</h2>
        <p class="lead">Sign in to continue to your account.</p>

        <div th:if="${message}" class="alert alert-success">
            <p th:text="${message}"></p>
        </div>

        <!-- Display login error when authentication fails -->
        <div th:if="${param.error}" class="alert alert-error">
            <p>&#10060; Invalid email or password. Please try again.</p>
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autofocus />
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required />
            </div>
            <div class="form-actions">
                <button class="btn" type="submit">Sign in</button>
                <div class="links">
                    <a th:href="@{/forgot-password}" class="action-btn forgot-btn">Forgot Password</a>
                    <a th:href="@{/register}" class="action-btn register-btn" style="margin-left:10px">Register</a>
                </div>
            </div>
        </form>
        <div style="margin-top:14px;text-align:center">
            <a th:href="@{/home}" class="return-home-btn">
                <span style="font-size:1rem;line-height:1">&#8592;</span>
                <span>Return to Home</span>
            </a>
        </div>
    </div>
    <script src="/js/loading-animation.js"></script>
    <script src="/js/chatbot-widget.js"></script>
</body>
</html>
