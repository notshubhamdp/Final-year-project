<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Visit Scheduling</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/images/nivasa-logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/visit-list.css">
    
    <link rel="stylesheet" href="/css/professional-theme.css">
        <link rel="stylesheet" href="/css/chatbot-widget.css">
<link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
<div class="page">
    <div class="topbar">
        <h2>Visit Scheduling</h2>
        <a class="back-link" href="/dashboard">Back to Dashboard</a>
    </div>
    <p class="alert success" th:if="${message}" th:text="${message}"></p>
    <p class="alert error" th:if="${error}" th:text="${error}"></p>

    <div class="card" th:if="${user.role == 'TENANT'}">
        <h3>Request Visit Slot</h3>
        <form method="post" action="/visits/request" class="visit-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>Property:</label>
            <select name="propertyId" required>
                <option th:each="p : ${properties}" th:value="${p.id}" th:text="${p.name + ' (' + p.propertyId + ')'}"></option>
            </select>
            <label>Start:</label><input type="datetime-local" name="start" required>
            <label>End:</label><input type="datetime-local" name="end" required>
            <label>Note:</label><textarea name="note"></textarea>
            <button type="submit" class="btn primary">Request Visit</button>
        </form>
    </div>

    <div class="card">
        <h3>Calendar View</h3>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Property</th>
                    <th>Requested Slot</th>
                    <th>Approved Slot</th>
                    <th>Status</th>
                    <th>Tenant Note</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="v : ${visits}">
                    <td th:text="${v.id}"></td>
                    <td th:text="${propertyPublicIdMap[v.propertyId]}"></td>
                    <td th:text="${v.requestedStart + ' - ' + v.requestedEnd}"></td>
                    <td th:text="${v.approvedStart != null  v.approvedStart + ' - ' + v.approvedEnd : '-'}"></td>
                    <td><span class="status-pill" th:text="${v.status}"></span></td>
                    <td th:text="${v.tenantNote}"></td>
                    <td>
                        <div class="action-stack" th:if="${user.role == 'LANDLORD'}">
                            <form th:action="@{'/visits/' + ${v.id} + '/approve'}" method="post" class="inline-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="text" name="note" placeholder="note">
                                <button type="submit" class="btn success">Approve</button>
                            </form>
                            <form th:action="@{'/visits/' + ${v.id} + '/reschedule'}" method="post" class="inline-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="datetime-local" name="start" required>
                                <input type="datetime-local" name="end" required>
                                <input type="text" name="note" placeholder="note">
                                <button type="submit" class="btn warn">Reschedule</button>
                            </form>
                            <form th:action="@{'/visits/' + ${v.id} + '/reject'}" method="post" class="inline-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="text" name="note" placeholder="note">
                                <button type="submit" class="btn danger">Reject</button>
                            </form>
                        </div>
                        <div class="action-stack" th:if="${user.role == 'TENANT'}">
                            <form th:if="${v.status == 'REQUESTED' or v.status == 'APPROVED' or v.status == 'RESCHEDULED'}"
                                  th:action="@{'/visits/' + ${v.id} + '/cancel'}"
                                  method="post"
                                  class="inline-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="text" name="note" placeholder="cancel reason (optional)">
                                <button type="submit" class="btn danger">Cancel Request</button>
                            </form>
                            <span th:if="${!(v.status == 'REQUESTED' or v.status == 'APPROVED' or v.status == 'RESCHEDULED')}">No action</span>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
    <script src="/js/chatbot-widget.js"></script>
</body>
</html>
