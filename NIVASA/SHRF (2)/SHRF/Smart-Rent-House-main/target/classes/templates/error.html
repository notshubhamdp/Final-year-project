<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Smart Rent House</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .error-container {
            background-color: white;
            padding: 60px 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
        }

        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 28px;
            color: #e74c3c;
            margin-bottom: 15px;
        }

        .error-message {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .error-details {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 30px;
            text-align: left;
            color: #555;
            font-size: 14px;
        }

        .back-button {
            display: inline-block;
            padding: 12px 30px;
            background-color: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .back-button:hover {
            background-color: #764ba2;
        }
    </style>
    
    <link rel="stylesheet" href="/css/professional-theme.css">
        <link rel="stylesheet" href="/css/chatbot-widget.css">
<link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
    <div class="error-container">
        <div class="error-icon">&#9888;&#65039;</div>
        <h1 class="error-title">Oops! Something went wrong</h1>
        <p class="error-message" th:text="${error != null ? error : 'An unexpected error occurred. Please try again later.'}"></p>
        
        <div th:if="${exception != null}" class="error-details">
            <strong>Error Details:</strong><br>
            <span th:text="${exception}"></span>
        </div>

        <a href="/dashboard" class="back-button">&#8592; Back to Dashboard</a>
    </div>
    <script src="/js/chatbot-widget.js"></script>
</body>
</html>
